[loggers]
keys=root,werkzeug,socketio,engineio

[handlers]
keys=consoleHandler

[formatters]
keys=logFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_werkzeug]
level=ERROR
handlers=consoleHandler
qualname=werkzeug
propagate=0

[logger_socketio]
level=WARNING
handlers=consoleHandler
qualname=socketio
propagate=0

[logger_engineio]
level=WARNING
handlers=consoleHandler
qualname=engineio
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=logFormatter
args=(sys.stdout,)

[formatter_logFormatter]
format=%(asctime)s | %(levelname)-8s | %(filename)s | %(funcName)s | %(lineno)04d | %(message)s
