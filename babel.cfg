# Babel extraction configuration for ParalaX Web Framework
# This file tells pybabel where to find translatable strings

[python: **.py]
encoding = utf-8

[jinja2: **/templates/**.html]
encoding = utf-8
extensions=jinja2.ext.autoescape,jinja2.ext.with_

[jinja2: **/templates/**.j2]
encoding = utf-8
extensions=jinja2.ext.autoescape,jinja2.ext.with_
