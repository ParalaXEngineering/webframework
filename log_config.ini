[loggers]
keys=root,website,werkzeug,permission_validator

[handlers]
keys=fileHandlerRoot,fileHandlerWebsite,consoleHandler

[formatters]
keys=logFormatter,consoleFormatter

[logger_root]
level=DEBUG
handlers=fileHandlerRoot,consoleHandler
propagate=1

[logger_website]
level=INFO
handlers=fileHandlerWebsite,consoleHandler
qualname=website
propagate=0

[logger_werkzeug]
level=ERROR
handlers=fileHandlerWebsite,consoleHandler
qualname=werkzeug
propagate=0

[logger_permission_validator]
level=INFO
handlers=fileHandlerWebsite,consoleHandler
qualname=permission_validator
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=consoleFormatter
args=(sys.stdout,)

[handler_fileHandlerWebsite]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=logFormatter
args=(os.path.join(os.environ.get('LOG_DIR', 'logs'), 'website.log'), 'W0', 1)

[handler_fileHandlerRoot]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=logFormatter
args=(os.path.join(os.environ.get('LOG_DIR', 'logs'), 'root.log'), 'W0', 1)

[formatter_logFormatter]
format=%(asctime)s | %(levelname)-8s | %(filename)s | %(funcName)s | %(lineno)04d | %(message)s

[formatter_consoleFormatter]
format=%(asctime)s | %(levelname)-8s | %(filename)s | %(funcName)s | %(lineno)04d | %(message)s
